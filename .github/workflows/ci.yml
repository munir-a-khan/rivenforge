name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check api core tests data_util.py api_sidecar.py
      - name: Mypy
        run: python -m mypy --follow-imports=skip api tests/test_api.py tests/test_config_migration.py data_util.py api_sidecar.py
      - name: Tests
        run: python -m pytest --cov=api --cov=core

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  package-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build sidecar
        working-directory: frontend
        run: npm run sidecar:build
      - name: Tauri build
        working-directory: frontend
        run: npm run tauri build
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: rivenforge-windows
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
